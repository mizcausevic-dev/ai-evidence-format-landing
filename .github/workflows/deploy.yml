name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: SFTP-sync static site to evidence.kineticgain.com
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify site root contains AI Evidence Format landing
        run: |
          test -f index.html || (echo "FAIL: no index.html at repo root" && exit 1)
          grep -q "AI Evidence Format" index.html || (echo "FAIL: index.html does not mention AI Evidence Format" && exit 1)
          echo "OK: site root verified"
          ls -lah

      # Deploy over SSH (port 65002) rather than FTP (port 21). Hostinger blocks
      # GitHub-runner IPs on port 21 (530/timeout) but not on 65002, so SFTP-key
      # deploys land where FTP fails. Mirrors kinetic-gain-suite-landing's proven
      # path. Key is repo secret SSH_PRIVATE_KEY (registered in hPanel SSH Keys).
      - name: Load SSH key into ssh-agent (webfactory)
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555  # v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Seed known_hosts for Hostinger:65002
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          HOST="${FTP_HOST#ftp://}"; HOST="${HOST#sftp://}"; HOST="${HOST%/}"
          ssh-keyscan -p 65002 -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "known_hosts seeded for $HOST:65002"

      - name: SFTP-Deploy to /evidence/ via tar | ssh
        timeout-minutes: 8
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
        run: |
          set -euo pipefail
          HOST="${FTP_HOST#ftp://}"; HOST="${HOST#sftp://}"; HOST="${HOST%/}"
          # Tar the static site (excluding repo metadata), pipe over SSH, untar
          # on the server into the evidence.kineticgain.com docroot.
          tar --exclude='./.git' --exclude='./.github' --exclude='.gitignore' \
              --exclude='node_modules' --exclude='.DS_Store' \
              --exclude='README.md' --exclude='LICENSE' \
              -czf - . | \
          ssh -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=30 \
              -o ServerAliveInterval=15 \
              -p 65002 \
              "$FTP_USER@$HOST" \
              'cd domains/kineticgain.com/public_html/evidence/ && tar -xzf - && echo "DEPLOY_EXTRACTED"'
          echo "SFTP deploy complete."
